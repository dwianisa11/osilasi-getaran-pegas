<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <title>Analysis – Data Mentah Osilasi Pegas</title>

  <!-- ================= CSS ================= -->
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
  <link rel="stylesheet" href="../css/analysis.css" />
</head>

<body>

<div class="app">

  <!-- ================= SIDEBAR ================= -->
  <aside class="sidebar" id="sidebar">

    <div class="sidebar-header">
      <span class="sidebar-title">Osilasi Pegas</span>

      <button class="collapse-btn" onclick="toggleSidebar()">
        ❮
      </button>
    </div>

    <nav class="sidebar-nav">

      <a class="nav-item" href="current.html">
        <span class="nav-icon">📈</span>
        <span class="nav-text">Current</span>
      </a>

      <a class="nav-item active" href="analysis.html">
        <span class="nav-icon">📊</span>
        <span class="nav-text">Analysis</span>
      </a>

      <a class="nav-item" href="fitting.html">
        <span class="nav-icon">〰️</span>
        <span class="nav-text">Fitting Sinus</span>
      </a>

    </nav>

  </aside>

  <!-- ================= MAIN ================= -->
  <main class="main">

    <!-- ================= TOPBAR ================= -->
    <div class="topbar">

      <h1>Analisis Data Mentah Osilasi Pegas</h1>

      <button class="theme-btn" onclick="toggleTheme()">
        Theme
      </button>

    </div>

    <!-- ================= CARDS ================= -->
    <section class="cards">

      <!-- Upload -->
      <div class="card">

        <div class="card-title">
          Upload Data CSV / Excel
        </div>

        <input
          type="file"
          id="csvInput"
          accept=".csv,.xlsx"
          class="file-input"
        />

        <div
          id="savedFileName"
          style="
            margin-top: 10px;
            font-size: 13px;
            color: var(--text-muted);
          "
        >
        </div>

      </div>

      <!-- Status Data -->
      <div class="card">

        <div class="card-title">
          Status Data
        </div>

        <div class="stat-row">
          <span>Data</span>
          <span id="dataStatus">Belum dimuat</span>
        </div>

        <div class="stat-row">
          <span>Jumlah Data</span>
          <span id="dataCount">-</span>
        </div>

        <button
          id="fitBtn"
          class="theme-btn"
          disabled
          style="margin-top: 14px;"
        >
          Lihat Hasil Fitting Sinus
        </button>

      </div>

    </section>

    <!-- ================= GRAFIK DATA MENTAH ================= -->
    <section class="chart-card">

      <h3>Grafik Data Mentah x(t)</h3>

      <p
        style="
          margin-top: -5px;
          margin-bottom: 14px;
          font-size: 13px;
          color: var(--text-muted);
        "
      >
        Grafik ini menampilkan data asli simpangan terhadap waktu dari file CSV atau Excel.
      </p>

      <div class="chart-wrapper analysis-chart">

        <canvas id="rawChart"></canvas>

      </div>

    </section>

  </main>

</div>

<!-- ================= JS ================= -->

<script src="../js/ui.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script src="../js/analysis.js"></script>

</body>
</html>
